services:
  postgres:
    image: postgres:16
    container_name: adhd-assistant-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: adhd_assistant
      POSTGRES_USER: adhd
      POSTGRES_PASSWORD: adhd
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: